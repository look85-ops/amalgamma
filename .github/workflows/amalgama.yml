name: amalgama evolve

on:
  schedule:
    - cron: "0 * * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  evolve:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_PAT }}

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install deps
        run: pip install -r requirements.txt

      - name: Clone read-only repos for Amalgama
        run: |
          mkdir -p repos
          for repo in look85-ops/NAAssistant look85-ops/digital-garden; do
            if [ ! -d "repos/$(basename $repo)" ]; then
              git clone --depth 1 "https://github.com/$repo.git" "repos/$(basename $repo)"
            else
              cd "repos/$(basename $repo)" && git pull origin main && cd ../..
            fi
          done

      - name: Run curator
        env:
          EITHER_API_KEY: ${{ secrets.EITHER_API_KEY }}
          FREE_API_KEYS: ${{ secrets.FREE_API_KEYS }}
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: python src/curator.py

      - name: Validate artifact formats
        run: |
          echo "Validating that newly created .md files do not contain HTML document scaffolding..."
          git status --porcelain artifacts/ | awk '$0 ~ /\.md$/ {print $2}' | while IFS= read -r f; do
            if grep -qE '<!DOCTYPE html|<html[[:space:]>]' "$f" 2>/dev/null; then
              echo "ERROR: HTML content in .md file: $f"
              exit 1
            fi
          done
          echo "All new artifacts pass format validation."

      - name: Commit new cycle
        env:
          GH_PAT: ${{ secrets.GH_PAT }}
        run: |
          git config user.name "amalgama-bot"
          git config user.email "amalgama-bot@users.noreply.github.com"
          git remote set-url origin https://look85-ops:${GH_PAT}@github.com/look85-ops/amalgamma.git
          git add -A
          git diff --staged --quiet || git commit -m "amalgama: new cycle $(date -u +'%Y-%m-%d %H:%M')"
          git push
